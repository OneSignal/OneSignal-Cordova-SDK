name: 'Setup Demo'
description: 'Installs toolchains, builds the SDK, sets up the Capacitor demo
  app, and creates the .env file'
inputs:
  onesignal-app-id:
    description: 'OneSignal App ID for the demo .env'
    required: true
  onesignal-api-key:
    description: 'OneSignal API Key for the demo .env'
    required: true
  install-pods:
    description: 'Whether to run cap sync + pod update for iOS (handled inside
      examples/setup.sh)'
    required: false
    default: 'false'
runs:
  using: 'composite'
  steps:
    - name: Set up Vite+
      uses: voidzero-dev/setup-vp@v1
      with:
        cache: true
        run-install: true

    - name: Cache demo Vite+ dependencies
      uses: actions/cache@v5
      with:
        path: examples/demo/node_modules
        key: vp-demo-${{ runner.os }}-${{ hashFiles('examples/demo/bun.lock') }}
        restore-keys: vp-demo-${{ runner.os }}-

    - name: Cache CocoaPods
      if: inputs.install-pods == 'true'
      uses: actions/cache@v5
      with:
        path: examples/demo/ios/App/Pods
        key: pods-${{ runner.os }}-${{ hashFiles('examples/demo/ios/App/Podfile.lock')
          }}
        restore-keys: pods-${{ runner.os }}-

    - name: Create demo .env
      shell: bash
      working-directory: examples/demo
      run: |
        echo "VITE_ONESIGNAL_APP_ID=${{ inputs.onesignal-app-id }}" > .env
        echo "VITE_ONESIGNAL_API_KEY=${{ inputs.onesignal-api-key }}" >> .env
        echo "VITE_ONESIGNAL_ANDROID_CHANNEL_ID=7ec2ece9-c538-4656-9516-1316f48a005c" >> .env

    - name: Set up demo
      shell: bash
      working-directory: examples/demo
      run: vp run setup
